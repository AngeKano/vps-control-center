services:
  postgres:
    image: postgres:16-alpine
    container_name: vps-control-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vps_admin
      POSTGRES_PASSWORD: VpsControl2025!
      POSTGRES_DB: vps_control
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vps_admin -d vps_control"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
